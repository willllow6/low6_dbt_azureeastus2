version: 2

models:

  - name: stg_penn__tenants
    columns:
      - name: tenant_id
        tests:
          - unique
          - not_null
      - name: client_id
        tests:
          - not_null

  - name: stg_penn__tournaments
    columns:
      - name: tournament_id
        tests:
          - unique
          - not_null
      - name: tenant_id
        tests:
          - not_null
      - name: game_type
        tests:
          - not_null
          - accepted_values:
              values: ['squads']

  - name: stg_penn__rounds
    columns:
      - name: round_id
        tests:
          - unique
          - not_null
      - name: tournament_id
        tests:
          - not_null
      - name: game_type
        tests:
          - not_null
          - accepted_values:
              values: ['squads']

  - name: stg_penn__users
    columns:
      - name: user_id
        tests:
          - unique
          - not_null

  - name: stg_penn__user_contests
    columns:
      - name: user_contest_id
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: tournament_id
        tests:
          - not_null

  - name: stg_penn__user_rounds
    columns:
      - name: user_round_id
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: round_id
        tests:
          - not_null

  - name: stg_penn__user_slots
    columns:
      - name: user_slot_id
        tests:
          - unique
          - not_null
      - name: user_round_id
        tests:
          - not_null

  - name: stg_penn__players
    columns:
      - name: player_id
        tests:
          - unique
          - not_null

  - name: stg_penn__awards
    columns:
      - name: award_id
        tests:
          - unique
          - not_null
      - name: entry_id
        tests:
          - not_null
