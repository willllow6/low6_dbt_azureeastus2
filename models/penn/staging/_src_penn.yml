version: 2

sources:

  - name: penn
    description: Penn source data
    database: low6_azureeastus2
    schema: adfpenn
    tags: ['penn']
    tables:

      - name: tenants
        identifier: tenants

      - name: users
        identifier: users

      - name: squads_contests
        identifier: squads_contests
        description: Tournaments — groups of rounds sharing a tenant and schedule

      - name: squads_rounds
        identifier: squads_rounds
        description: Rounds — the canonical contest unit a user enters

      - name: squads_user_contests
        identifier: squads_user_contests
        description: User registrations at tournament level

      - name: squads_user_rounds
        identifier: squads_user_rounds
        description: User entries at round level; one row per user per round

      - name: squads_user_slots
        identifier: squads_user_slots
        description: User slot selections; one row per day per user per round

      - name: squads_round_reveal_days
        identifier: squads_round_reveal_days
        description: Reveal schedule per round day (registered for future use)

      - name: squads_awards
        identifier: squads_awards
        description: Per-goal monetary awards linked to user_round_id

      - name: soccer_players
        identifier: soccer_players
        description: Soccer player reference data
