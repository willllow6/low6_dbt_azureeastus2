          - not_null
      - name: user_id
        tests:
          - not_null
      - name: contest_id
        tests:
          - not_null
      - name: game_type
        tests:
          - not_null
          - accepted_values:
              values: ['squads']

  - name: mart_penn__awards
    columns:
      - name: award_id
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null

  - name: mart_penn__users
    columns:
      - name: user_id
        tests:
          - unique
          - not_null

  - name: mart_penn__user_activity_daily
    columns:
      - name: date_day
        tests:
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: game_type
        tests:
          - not_null
          - accepted_values:
              values: ['squads']

  # -------------------------------------------------------
