version: 2

models:

  # -------------------------------------------------------
  # Core — dimensions and facts
  # -------------------------------------------------------

  - name: dim_penn__users
    columns:
      - name: user_id
        tests:
          - unique
          - not_null

  - name: dim_penn__tenants
    columns:
      - name: tenant_id
        tests:
          - unique
          - not_null

  - name: dim_penn__contests
    columns:
      - name: contest_id
        tests:
          - unique
          - not_null
      - name: tenant_id
        tests:
          - not_null
      - name: tournament_id
        tests:
          - not_null
      - name: game_type
        tests:
          - not_null
          - accepted_values:
              values: ['squads']

  - name: fct_penn__entries
    columns:
      - name: entry_id
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: contest_id
        tests:
          - not_null
      - name: tenant_id
        tests:
          - not_null
      - name: game_type
        tests:
          - not_null
          - accepted_values:
              values: ['squads']

  - name: fct_penn__selections
    columns:
      - name: selection_id
        tests:
          - unique
          - not_null
      - name: entry_id
        tests:
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: contest_id
        tests:
          - not_null
      - name: game_type
        tests:
          - not_null
          - accepted_values:
              values: ['squads']

  - name: fct_penn__awards
    columns:
      - name: award_id
        tests:
          - unique
          - not_null
      - name: entry_id
        tests:
          - not_null
      - name: user_id
        tests:
          - not_null

  # -------------------------------------------------------
  # Reporting marts
  # -------------------------------------------------------

  - name: mart_penn__entries
    columns:
      - name: entry_id
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: contest_id
        tests:
          - not_null
      - name: game_type
        tests:
          - not_null
          - accepted_values:
              values: ['squads']

  - name: mart_penn__selections
    columns:
      - name: selection_id
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: contest_id
        tests:
          - not_null
      - name: game_type
        tests:
          - not_null
          - accepted_values:
              values: ['squads']

  - name: mart_penn__awards
    columns:
      - name: award_id
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null

  - name: mart_penn__users
    columns:
      - name: user_id
        tests:
          - unique
          - not_null
