version: 2

models:

  - name: int_penn__entries
    description: Joins user_rounds to rounds and tournaments to resolve tenant_id; produces one row per user per round with canonical IDs.
    columns:
      - name: entry_id
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: contest_id
        tests:
          - not_null
      - name: tournament_id
        tests:
          - not_null
      - name: tenant_id
        tests:
          - not_null
      - name: client_id
        tests:
          - not_null
      - name: game_type
        tests:
          - not_null
          - accepted_values:
              values: ['squads']
