version: 2

models:

  - name: int_opap_spintowin__entries
    description: >
      Entry-grain model enriched with contest details, prize tier info, and entry number.
      One row per user per contest. Joins entries to contests and prize_tiers; adds
      user_entry_number via window function.
    columns:
      - name: entry_id
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: contest_id
        tests:
          - not_null
      - name: client_id
        tests:
          - not_null
      - name: tenant_id
        tests:
          - not_null
      - name: game_type
        tests:
          - not_null
          - accepted_values:
              values: ['pickem', 'bingo', 'bracket', 'fantasy', 'streak', 'squads',
                       'daily_quiz', 'live_quiz', 'prize_competition', 'instant_win',
                       'daily_reveal', 'spin_to_win']
      - name: user_entry_number
        tests:
          - not_null

  - name: int_opap_spintowin__selections
    description: >
      Selection-grain model enriched with reel/event information.
      Joins picks to reel_options, contest_reels, contest_fixtures, and entries to produce
      the selection_sequence, selection_value, event_id, and event_name fields.
    columns:
      - name: selection_id
        tests:
          - unique
          - not_null
      - name: entry_id
        tests:
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: contest_id
        tests:
          - not_null
      - name: game_type
        tests:
          - not_null
          - accepted_values:
              values: ['spin_to_win']

  - name: int_opap_spintowin__payouts
    description: >
      Payout-grain model joining prize_awards to prize_tiers (for prize type/amount)
      and entries (for contest_id). One row per prize award.
    columns:
      - name: payout_id
        tests:
          - unique
          - not_null
      - name: entry_id
        tests:
          - not_null
      - name: user_id
        tests:
          - not_null
