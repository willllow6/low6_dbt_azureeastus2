version: 2

models:
  - name: stg_bet365_uf__users
    columns:
      - name: user_id
        tests:
          - unique
          - not_null
      - name: client_id
        tests:
          - not_null
      - name: game_type
        tests:
          - not_null
          - accepted_values:
              values: ['fantasy']

  - name: stg_bet365_uf__tenants
    columns:
      - name: tenant_id
        tests:
          - unique
          - not_null
      - name: client_id
        tests:
          - not_null

  - name: stg_bet365_uf__competitions
    columns:
      - name: competition_id
        tests:
          - unique
          - not_null
      - name: client_id
        tests:
          - not_null

  - name: stg_bet365_uf__contests
    columns:
      - name: contest_id
        tests:
          - unique
          - not_null
      - name: client_id
        tests:
          - not_null
      - name: game_type
        tests:
          - not_null
          - accepted_values:
              values: ['fantasy']
      - name: contest_status
        tests:
          - accepted_values:
              values: ['scheduled', 'live', 'completed']

  - name: stg_bet365_uf__game_weeks
    columns:
      - name: stage_period_id
        tests:
          - unique
          - not_null
      - name: client_id
        tests:
