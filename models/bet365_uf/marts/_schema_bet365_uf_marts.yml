      - name: client_id
        tests:
          - not_null
      - name: game_type
        tests:
          - not_null
          - accepted_values:
              values: ['fantasy']
      - name: contest_status
        tests:
          - accepted_values:
              values: ['scheduled', 'live', 'completed']

  - name: dim_bet365_uf__scoreables
    columns:
