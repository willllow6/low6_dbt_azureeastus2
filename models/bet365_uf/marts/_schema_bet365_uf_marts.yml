version: 2

models:

  # ── fct_ models ──────────────────────────────────────────────────────────────

  - name: fct_bet365_uf__entries
    columns:
      - name: entry_id
        tests:
          - unique
          - not_null
      - name: contest_id
        tests:
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: tenant_id
        tests:
          - not_null
      - name: client_id
        tests:
          - not_null
      - name: game_type
        tests:
          - not_null
          - accepted_values:
              values: ['fantasy']

  - name: fct_bet365_uf__selections
    columns:
      - name: selection_id
        tests:
          - unique
          - not_null
      - name: entry_id
        tests:
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: client_id
        tests:
          - not_null
      - name: game_type
        tests:
          - not_null
          - accepted_values:
              values: ['fantasy']

  - name: fct_bet365_uf__coin_transactions
    columns:
      - name: coin_transaction_id
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: tenant_id
        tests:
          - not_null
      - name: client_id
        tests:
          - not_null
      - name: game_type
        tests:
          - not_null
          - accepted_values:
              values: ['fantasy']

  - name: fct_bet365_uf__app_store_purchases
    columns:
      - name: purchase_id
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: client_id
        tests:
          - not_null
      - name: game_type
        tests:
          - not_null
          - accepted_values:
              values: ['fantasy']

  - name: fct_bet365_uf__card_ownership_changes
    columns:
      - name: card_ownership_change_id
        tests:
          - unique
          - not_null
      - name: card_id
        tests:
          - not_null
      - name: client_id
        tests:
          - not_null

  # ── dim_ models ───────────────────────────────────────────────────────────────

  - name: dim_bet365_uf__users
